name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Push package to NuGet.org
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Clean
        run: dotnet clean Radzen.Blazor/Radzen.Blazor.csproj -c Release

      - name: Build (Release)
        run: dotnet build Radzen.Blazor/Radzen.Blazor.csproj -c Release

      - name: Verify integrity hashes
        shell: bash
        run: |
          set -euo pipefail

          PROPS="Radzen.Blazor/obj/Release/net10.0/staticwebassets/msbuild.Radzen.Blazor.Microsoft.AspNetCore.StaticWebAssets.props"
          WWWROOT="Radzen.Blazor/wwwroot"

          if [ ! -f "$PROPS" ]; then
            echo "::error::Static web assets props file not found: $PROPS"
            exit 1
          fi

          ERRORS=0
          COUNT=0

          # Parse RelativePath and Integrity child elements from each StaticWebAsset block
          while IFS= read -r rel_path; do
            IFS= read -r integrity || true

            file="$WWWROOT/$rel_path"
            [ ! -f "$file" ] && continue

            actual=$(openssl dgst -sha256 -binary "$file" | openssl base64 -A)
            COUNT=$((COUNT + 1))

            if [ "$actual" != "$integrity" ]; then
              echo "::error::MISMATCH $rel_path — declared=$integrity actual=$actual"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $rel_path"
            fi
          done < <(sed -n 's/.*<RelativePath>\([^<]*\)<\/RelativePath>.*/\1/p; s/.*<Integrity>\([^<]*\)<\/Integrity>.*/\1/p' "$PROPS")

          echo "Checked $COUNT assets, $ERRORS mismatches"

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi

          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No assets with integrity hashes found"
            exit 1
          fi

          echo "All integrity hashes verified."

      - name: Test
        run: dotnet test Radzen.Blazor.Tests/Radzen.Blazor.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack Radzen.Blazor/Radzen.Blazor.csproj -c Release --no-build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            Radzen.Blazor/bin/Release/*.nupkg
            Radzen.Blazor/bin/Release/*.snupkg

      - name: Push to NuGet
        if: inputs.publish
        run: dotnet nuget push "Radzen.Blazor/bin/Release/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
